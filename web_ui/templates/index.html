<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroClone</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #1e1b2e;
      --surface: #252236;
      --surface2: #2d2842;
      --surface3: #34304d;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.11);
      --border3: rgba(255, 255, 255, 0.18);
      --text: #eeeaf8;
      --text2: #a89ec4;
      --text3: #5e5878;
      --purple: #a78bfa;
      --purple-dim: rgba(167, 139, 250, 0.12);
      --teal: #2dd4bf;
      --teal-dim: rgba(45, 212, 191, 0.1);
      --amber: #fbbf24;
      --amber-dim: rgba(251, 191, 36, 0.1);
      --green: #4ade80;
      --green-dim: rgba(74, 222, 128, 0.1);
      --red: #f87171;
      --red-dim: rgba(248, 113, 113, 0.1);
      --r-md: 9px;
      --r-lg: 13px;
      --r-xl: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Geist', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    .wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    /* Header */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .hdr-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hdr-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--purple-dim);
      border: 1px solid rgba(167, 139, 250, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .hdr-name {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--text);
    }

    .hdr-desc {
      font-size: 12px;
      color: var(--text3);
      margin-top: 2px;
    }

    .hdr-badge {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--teal);
      background: var(--teal-dim);
      border: 1px solid rgba(45, 212, 191, 0.2);
      border-radius: 99px;
      padding: 4px 10px;
    }

    /* State bar */
    .state-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--r-xl);
      padding: 14px 18px;
      margin-bottom: 12px;
    }

    .sdot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text3);
      transition: background 0.25s, box-shadow 0.25s;
    }

    .sdot.off {
      background: var(--red);
    }

    .sdot.on {
      background: var(--green);
      box-shadow: 0 0 7px rgba(74, 222, 128, 0.5);
    }

    .sdot.listen {
      background: var(--amber);
      box-shadow: 0 0 7px rgba(251, 191, 36, 0.5);
    }

    .sdot.think {
      background: var(--purple);
      box-shadow: 0 0 7px rgba(167, 139, 250, 0.5);
    }

    .sdot.speak {
      background: var(--teal);
      box-shadow: 0 0 7px rgba(45, 212, 191, 0.5);
    }

    .sinfo {
      flex: 1;
    }

    .slabel {
      font-size: 11px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .svalue {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      margin-top: 2px;
    }

    .stag {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 99px;
      border: 1px solid;
      transition: all 0.2s;
    }

    .stag.off {
      color: var(--red);
      border-color: rgba(248, 113, 113, 0.3);
      background: var(--red-dim);
    }

    .stag.on {
      color: var(--green);
      border-color: rgba(74, 222, 128, 0.3);
      background: var(--green-dim);
    }

    .stag.listen {
      color: var(--amber);
      border-color: rgba(251, 191, 36, 0.3);
      background: var(--amber-dim);
    }

    .stag.think {
      color: var(--purple);
      border-color: rgba(167, 139, 250, 0.3);
      background: var(--purple-dim);
    }

    .stag.speak {
      color: var(--teal);
      border-color: rgba(45, 212, 191, 0.3);
      background: var(--teal-dim);
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      align-items: center;
    }

    button {
      font-family: 'Geist', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 16px;
      border-radius: var(--r-md);
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
      outline: none;
    }

    button:hover {
      background: var(--surface2);
      border-color: var(--border3);
      color: var(--text);
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.3;
      cursor: default;
      transform: none;
    }

    button.primary {
      background: var(--purple-dim);
      border-color: rgba(167, 139, 250, 0.35);
      color: var(--purple);
      font-weight: 600;
    }

    button.primary:hover {
      background: rgba(167, 139, 250, 0.2);
      border-color: rgba(167, 139, 250, 0.5);
    }

    button.ptt.active {
      background: var(--amber-dim);
      border-color: rgba(251, 191, 36, 0.35);
      color: var(--amber);
    }

    button.ghost {
      background: transparent;
      border-color: var(--border);
      color: var(--text3);
      font-size: 12px;
    }

    button.ghost:hover {
      background: var(--surface);
      border-color: var(--border2);
      color: var(--text2);
    }

    button.danger {
      background: transparent;
      border-color: var(--border);
      color: var(--text3);
      font-size: 12px;
      margin-left: auto;
    }

    button.danger:hover {
      background: var(--red-dim);
      border-color: rgba(248, 113, 113, 0.3);
      color: var(--red);
    }

    /* Log card */
    .log-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--r-xl);
      overflow: hidden;
    }

    .log-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .log-top-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
    }

    .log-count {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 2px 9px;
    }

    .log-body {
      height: 360px;
      overflow-y: auto;
      padding: 10px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .log-body::-webkit-scrollbar {
      width: 3px;
    }

    .log-body::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 4px;
    }

    .log-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text3);
      font-size: 13px;
      padding: 40px 0;
    }

    .msg {
      display: flex;
      gap: 10px;
      padding: 8px;
      border-radius: var(--r-md);
      transition: background 0.1s;
    }

    .msg:hover {
      background: var(--surface2);
    }

    .msg-ava {
      width: 27px;
      height: 27px;
      border-radius: 7px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      margin-top: 1px;
    }

    .msg.user .msg-ava {
      background: var(--teal-dim);
      color: var(--teal);
      border: 1px solid rgba(45, 212, 191, 0.2);
    }

    .msg.ai .msg-ava {
      background: var(--purple-dim);
      color: var(--purple);
      border: 1px solid rgba(167, 139, 250, 0.2);
    }

    .msg.system .msg-ava {
      background: var(--surface3);
      color: var(--text3);
      border: 1px solid var(--border2);
    }

    .msg-right {
      flex: 1;
      min-width: 0;
    }

    .msg-name {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 3px;
    }

    .msg.user .msg-name {
      color: var(--teal);
    }

    .msg.ai .msg-name {
      color: var(--purple);
    }

    .msg.system .msg-name {
      color: var(--text3);
    }

    .msg-text {
      font-size: 13.5px;
      color: var(--text);
      line-height: 1.6;
    }

    .msg.system .msg-text {
      color: var(--text3);
      font-size: 12px;
    }

    /* Input */
    .input-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }

    .input-wrap input {
      flex: 1;
      padding: 9px 12px;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: var(--r-md);
      font-family: 'Geist', sans-serif;
      font-size: 13.5px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .input-wrap input:focus {
      border-color: rgba(167, 139, 250, 0.4);
    }

    .input-wrap input::placeholder {
      color: var(--text3);
    }

    .send-btn {
      font-family: 'Geist', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 14px;
      background: var(--purple-dim);
      border: 1px solid rgba(167, 139, 250, 0.3);
      border-radius: var(--r-md);
      color: var(--purple);
      cursor: pointer;
      transition: all 0.15s;
    }

    .send-btn:hover {
      background: rgba(167, 139, 250, 0.2);
      border-color: rgba(167, 139, 250, 0.45);
    }

    /* Hints */
    .hints {
      display: flex;
      gap: 16px;
      margin-top: 14px;
      flex-wrap: wrap;
      padding: 0 2px;
    }

    .hint {
      font-size: 11.5px;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    kbd {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 2px 6px;
      color: var(--text2);
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="hdr">
      <div class="hdr-left">
        <div class="hdr-icon">🧠</div>
        <div>
          <div class="hdr-name">NeuroClone</div>
          <div class="hdr-desc">Speech · LLM · TTS · OSC</div>
        </div>
      </div>
      <div class="hdr-badge">v1.0.0</div>
    </div>

    <div class="state-bar">
      <div class="sdot off" id="sDot"></div>
      <div class="sinfo">
        <div class="slabel">Current state</div>
        <div class="svalue" id="sVal">Off</div>
      </div>
      <div class="stag off" id="sTag">OFF</div>
    </div>

    <div class="btn-row">
      <button class="primary" id="btnToggle" onclick="toggleEnabled()">Enable</button>
      <button class="ptt" id="btnPTT" onclick="togglePTT()" disabled>Push to talk</button>
      <button class="ghost" id="btnTestLLM" onclick="runTest('btnTestLLM','Test LLM','/api/test_llm')">Test LLM</button>
      <button class="ghost" id="btnTestSTT" onclick="runTest('btnTestSTT','Test STT','/api/test_stt')">Test STT</button>
      <button class="ghost" id="btnTestTTS" onclick="runTest('btnTestTTS','Test TTS','/api/test_tts')">Test TTS</button>
      <button class="danger" onclick="resetChat()">Clear</button>
    </div>

    <div class="log-card">
      <div class="log-top">
        <span class="log-top-title">Conversation</span>
        <span class="log-count" id="logCount">0 messages</span>
      </div>
      <div class="log-body" id="logBody">
        <div class="log-empty" id="logEmpty">No messages yet</div>
      </div>
      <div class="input-wrap">
        <input type="text" id="manualInput" placeholder="Type a message..."
          onkeydown="if(event.key==='Enter') sendManual()">
        <button class="send-btn" onclick="sendManual()">Send</button>
      </div>
    </div>

    <div class="hints">
      <span class="hint"><kbd>Space</kbd> push to talk</span>
      <span class="hint"><kbd>E</kbd> toggle on/off</span>
      <span class="hint"><kbd>Enter</kbd> send</span>
    </div>

  </div>

  <script>
    const socket = io();

    let entries = [], enabled = false, pttActive = false;
    const sDot = document.getElementById('sDot');
    const sVal = document.getElementById('sVal');
    const sTag = document.getElementById('sTag');
    const btnToggle = document.getElementById('btnToggle');
    const btnPTT = document.getElementById('btnPTT');
    const logBody = document.getElementById('logBody');
    const logEmpty = document.getElementById('logEmpty');
    const logCount = document.getElementById('logCount');

    const SM = {
      'OFF': { cls: 'off', label: 'Off', tag: 'OFF' },
      'ON': { cls: 'on', label: 'Ready', tag: 'ON' },
      'LISTENING': { cls: 'listen', label: 'Listening...', tag: 'LISTENING' },
      'THINKING': { cls: 'think', label: 'Thinking...', tag: 'THINKING' },
      'SPEAKING': { cls: 'speak', label: 'Speaking', tag: 'SPEAKING' },
    };

    function updateUI(s) {
      const m = SM[s.state] || { cls: 'off', label: s.state, tag: s.state };
      sDot.className = 'sdot ' + m.cls;
      sVal.textContent = m.label;
      sTag.className = 'stag ' + m.cls;
      sTag.textContent = m.tag;
      btnToggle.textContent = s.enabled ? 'Disable' : 'Enable';
      btnToggle.classList.toggle('primary', !s.enabled);
      btnPTT.disabled = !s.enabled;
      if (s.ptt_active) {
        btnPTT.classList.add('active');
        btnPTT.textContent = 'Listening...';
      } else {
        btnPTT.classList.remove('active');
        btnPTT.textContent = 'Push to talk';
      }
    }

    function toggleEnabled() {
      fetch('/api/toggle_enabled', { method: 'POST' })
        .then(r => r.json()).then(updateUI)
        .catch(() => { enabled = !enabled; updateUI({ enabled, ptt_active: pttActive, state: enabled ? 'ON' : 'OFF' }); });
    }

    function togglePTT() {
      fetch('/api/toggle_ptt', { method: 'POST' })
        .then(r => r.json()).then(updateUI)
        .catch(() => { pttActive = !pttActive; updateUI({ enabled, ptt_active: pttActive, state: pttActive ? 'LISTENING' : 'ON' }); });
    }

    function sendManual() {
      const input = document.getElementById('manualInput');
      const text = input.value.trim();
      if (!text) return;
      fetch('/api/send_text', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      }).catch(() => appendEntry({ role: 'user', text }));
      input.value = '';
    }

    function resetChat() {
      fetch('/api/reset', { method: 'POST' }).catch(() => { });
      entries = [];
      logBody.innerHTML = '';
      logBody.appendChild(logEmpty);
      logEmpty.style.display = 'flex';
      logCount.textContent = '0 messages';
    }

    function runTest(id, label, endpoint) {
      const btn = document.getElementById(id);
      btn.textContent = 'Testing...'; btn.disabled = true;
      fetch(endpoint, { method: 'POST' })
        .then(r => r.json())
        .then(data => {
          btn.textContent = label; btn.disabled = false;
          btn.style.color = data.success ? 'var(--green)' : 'var(--red)';
          alert(data.success ? (data.reply || data.message) : data.error);
          setTimeout(() => { btn.style.color = ''; }, 3000);
        })
        .catch(() => { btn.textContent = label; btn.disabled = false; });
    }

    function appendEntry(data) {
      if (logEmpty.parentNode) logEmpty.remove();
      entries.push(data);
      if (entries.length > 200) entries.shift();

      const cls = data.role === 'user' ? 'user' : data.role === 'assistant' ? 'ai' : 'system';
      const name = data.role === 'user' ? 'You' : data.role === 'assistant' ? 'NeuroClone' : 'System';
      const ava = data.role === 'user' ? 'YOU' : data.role === 'assistant' ? 'NC' : 'SYS';

      const div = document.createElement('div');
      div.className = 'msg ' + cls;
      div.innerHTML = `
      <div class="msg-ava">${ava}</div>
      <div class="msg-right">
        <div class="msg-name">${name}</div>
        <div class="msg-text">${esc(data.text)}</div>
      </div>`;
      logBody.appendChild(div);
      logBody.scrollTop = logBody.scrollHeight;

      const n = entries.length;
      logCount.textContent = n + ' message' + (n === 1 ? '' : 's');
    }

    function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    // Socket.IO live updates
    socket.on('status_update', updateUI);
    socket.on('chat_entry', data => {
      entries.push(data);
      if (entries.length > 200) entries = entries.slice(-200);
      appendEntry(data);
    });

    // Load initial state
    fetch('/api/status').then(r => r.json()).then(updateUI)
      .catch(() => updateUI({ enabled: false, ptt_active: false, state: 'OFF' }));
    fetch('/api/chat_log').then(r => r.json()).then(log => {
      log.forEach(appendEntry);
      logBody.scrollTop = logBody.scrollHeight;
    }).catch(() => { });

    // Keyboard shortcuts
    let spaceDown = false;
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space' && !spaceDown) {
        e.preventDefault(); spaceDown = true;
        fetch('/api/toggle_ptt', { method: 'POST' }).then(r => r.json()).then(s => {
          if (!s.ptt_active) fetch('/api/toggle_ptt', { method: 'POST' });
        });
      }
      if (e.key === 'e' || e.key === 'E') toggleEnabled();
    });
    document.addEventListener('keyup', e => {
      if (e.code === 'Space' && spaceDown) {
        spaceDown = false;
        fetch('/api/toggle_ptt', { method: 'POST' }).then(r => r.json()).then(s => {
          if (s.ptt_active) fetch('/api/toggle_ptt', { method: 'POST' });
        });
      }
    });
  </script>
</body>

</html>
